databaseChangeLog:
  - changeSet:
      id: 007
      author: Aleksey Podstavin
      changes:
        - createTable:
            tableName: movie_images
            columns:
              - column:
                  name: id
                  type: long
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: movie_id
                  type: long
                  constraints:
                    nullable: false
                    foreignKeyName: fk_images_movie_id
                    references: movie(id)
              - column:
                  name: filename
                  type: varchar(255)
                  constraints:
                    nullable: false