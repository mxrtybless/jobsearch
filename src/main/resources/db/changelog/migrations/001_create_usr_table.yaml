databaseChangeLog:
  - changeSet:
      id: 001
      author: Aleksey Podstavin
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: password
                  type: varchar(255)